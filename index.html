<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Lumi Phone</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-title" content="Lumi Phone" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- 与fullphone保持一致的中文字体加载（Noto Serif SC / Noto Sans SC），适配iOS Safari PWA -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <!-- 艺术字体：用于时间显示 - 极简风格 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- iOS 添加到主屏幕图标 -->
    <link rel="apple-touch-icon" sizes="180x180" href="/image/主屏幕图标.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/image/主屏幕图标.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/image/主屏幕图标.png" />
    <link rel="apple-touch-icon" href="/image/主屏幕图标.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
